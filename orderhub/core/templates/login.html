{% extends 'base_auth.html' %}

{% block title %}Login – OrderHub{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Sign In</h2>

    <form method="post" action="{% url 'core:login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="code">Customer Code</label>
            <input type="text" id="code" name="code" placeholder="e.g. CUST01" required autofocus />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p style="margin-top:1rem; font-size:0.9rem; text-align:center;">
        Don't have an account? <a href="{% url 'core:register' %}" style="color:#e94560; font-weight:600;">Register</a>
    </p>
</div>
{% endblock %}
